name: Build Pure Android Native APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 11 (No Cache Mode)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Grant Execute Permission for Gradle
        run: |
          find . -name "gradlew" -exec chmod +x {} \;

      - name: Build With Gradle Automatic Path
        run: |
          # Cari di mana letak file gradlew asli di dalam repositori
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Aset gradlew tidak ditemukan! Mencari folder dengan build.gradle..."
            GRADLE_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
            cd $GRADLE_DIR
            gradle assembleDebug --no-daemon
          else
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            echo "Menjalankan kompilasi di folder: $GRADLE_DIR"
            cd $GRADLE_DIR
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload Real Native APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-Asli-Native
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
