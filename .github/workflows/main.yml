name: Build Ionic Capacitor APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install Legacy Capacitor CLI Global
        run: npm install -g @ionic/cli @capacitor/cli@4.8.2

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Sub-Folder Dependencies and Build Assets
        run: |
          if [ -d "ANDRO1click" ]; then
            cd ANDRO1click
            npm install --legacy-peer-deps
            npm run build --if-present
            mkdir -p build www dist
            cp -r * build/ 2>/dev/null || true
            cd ..
            cp -r ANDRO1click/build ./build
          fi

      - name: Force Install Capacitor Packages Locally
        run: npm install @capacitor/core@4.8.2 @capacitor/cli@4.8.2 @capacitor/android@4.8.2 --save-dev --legacy-peer-deps

      - name: Create Missing Ionic Config File
        run: |
          echo '{"name": "Andro1Click", "integrations": {"capacitor": {}}, "type": "custom"}' > ionic.config.json

      - name: Create Fallback HTML If Empty
        run: |
          mkdir -p build www dist
          if [ ! -f "build/index.html" ]; then
            echo '<!DOCTYPE html><html><head><title>Andro1Click</title></head><body><h1>App Target Missing</h1></body></html>' > build/index.html
          fi

      - name: Initialize and Add Android Platform
        run: |
          npx cap init "Andro1Click" "com.andro1click.app" --web-dir=build || true
          npx cap add android || true
          npx cap sync android

      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          chmod -R +x android/
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Real
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-Real-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
