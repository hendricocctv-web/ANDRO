name: Build Ionic Capacitor APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Ionic and Capacitor CLI Global
        run: npm install -g @ionic/cli @capacitor/cli

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Force Install Capacitor Core Locally
        run: npm install @capacitor/core @capacitor/cli --save-dev --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Sync Capacitor Android
        run: |
          npx cap init "Andro1Click" "com.andro1click.app" --web-dir=build || true
          npx cap add android || true
          npx @capacitor/cli sync android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
