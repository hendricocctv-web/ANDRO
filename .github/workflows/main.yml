name: Build Pure Android Native APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "ANDRO1click/gradlew" ]; then
            cd ANDRO1click && chmod +x gradlew
          fi

      - name: Build With Gradle (Root or Sub-Folder)
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --no-daemon
          elif [ -f "ANDRO1click/gradlew" ]; then
            cd ANDRO1click && ./gradlew assembleDebug --no-daemon
          else
            echo "Mencari file build.gradle bawaan..."
            cd $(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
            chmod +x gradlew || true
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload Real Native APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-Asli-Native
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
