name: Build Pure Android Native APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK (Strict Path Mode)
        run: |
          echo "=== Mencari file build.gradle di dalam repositori ==="
          # Cari folder yang BENAR-BENAR berisi build.gradle di dalam repositori proyek
          TARGET_DIR=$(find . -maxdepth 3 -name "build.gradle" ! -path "*/.*" -exec dirname {} \; | head -n 1)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "Eror: Tidak ditemukan file build.gradle di dalam repositori kamu!"
            exit 1
          fi
          
          echo "Folder proyek ditemukan di: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Cek apakah ada gradlew lokal, jika tidak ada, buat baru pakai gradle global
          if [ ! -f "gradlew" ]; then
            echo "File gradlew tidak ada. Membuat gradle wrapper baru..."
            gradle wrapper
          fi
          
          chmod +x gradlew
          
          echo "=== Memulai Kompilasi APK ==="
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Real Native APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Andro1Click-Asli-Native
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
